<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Flow Banana Automator</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --bg-input: #1c2128;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --accent: #58a6ff;
      --success: #3fb950;
      --warning: #d29922;
      --error: #f85149;
      --border: rgba(240,246,252,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      padding: 12px;
      height: 100vh;
      overflow-y: auto;
    }
    h2 { font-size: 16px; margin-bottom: 12px; color: var(--accent); }
    h3 { font-size: 13px; margin-bottom: 8px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      resize: vertical;
      font-family: monospace;
    }
    textarea:focus { outline: none; border-color: var(--accent); }

    select, input[type="number"] {
      background: var(--bg-input);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      width: 100%;
    }

    .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .row label { min-width: 90px; color: var(--text-dim); font-size: 11px; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    button:hover:not(:disabled) { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #000; width: 100%; }
    .btn-danger { background: var(--error); color: #fff; }
    .btn-success { background: var(--success); color: #000; }
    .btn-secondary { background: var(--bg-input); color: var(--text); border: 1px solid var(--border); }
    .btn-small { padding: 4px 10px; font-size: 11px; }

    .actions { display: flex; gap: 8px; margin-top: 8px; }
    .actions button { flex: 1; }

    #log {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px;
      max-height: 250px;
      overflow-y: auto;
      font-size: 11px;
      font-family: monospace;
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-word;
    }

    #status {
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 10px;
      font-weight: 600;
      text-align: center;
    }
    .status-ready { background: rgba(88,166,255,0.1); color: var(--accent); }
    .status-running { background: rgba(63,185,80,0.1); color: var(--success); }
    .status-error { background: rgba(248,81,73,0.1); color: var(--error); }
    .status-upscaling { background: rgba(210,153,34,0.15); color: var(--warning); }

    .queue-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      margin-bottom: 4px;
      font-size: 11px;
      background: var(--bg-input);
    }
    .queue-item .idx { color: var(--text-dim); min-width: 24px; }
    .queue-item .prompt-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .queue-item .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0;
    }
    .queue-item .detail {
      font-size: 10px;
      color: var(--text-dim);
    }
    .dot-pending { background: var(--text-dim); }
    .dot-running { background: var(--accent); animation: pulse 1s infinite; }
    .dot-upscaling { background: var(--warning); animation: pulse 1.2s infinite; }
    .dot-downloading { background: var(--success); animation: pulse 0.8s infinite; }
    .dot-done { background: var(--success); }
    .dot-failed { background: var(--error); }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 4px 0;
      font-size: 11px; color: var(--text-dim);
      border-bottom: 1px solid var(--border);
    }
    .info-row:last-child { border-bottom: none; }
    .info-val { color: var(--text); font-weight: 500; }
  </style>
</head>
<body>
  <h2>🍌 Flow Banana v3</h2>

  <div id="status" class="status-ready">Ready</div>

  <!-- Mode Selection -->
  <div class="card">
    <h3>Mode</h3>
    <div class="row">
      <label>Type:</label>
      <select id="modeSelect">
        <option value="text-to-image">Text → Image</option>
        <option value="text-to-video">Text → Video</option>
      </select>
    </div>
  </div>

  <!-- Settings -->
  <div class="card">
    <h3>Settings</h3>
    <div class="row">
      <label>Count:</label>
      <select id="countSelect">
        <option value="1">x1</option>
        <option value="2">x2</option>
        <option value="3">x3</option>
        <option value="4" selected>x4</option>
      </select>
    </div>
    <div class="row">
      <label>Ratio:</label>
      <select id="ratioSelect">
        <option value="16:9">16:9 Landscape</option>
        <option value="4:3">4:3</option>
        <option value="1:1">1:1 Square</option>
        <option value="3:4">3:4</option>
        <option value="9:16">9:16 Portrait</option>
      </select>
    </div>
    <div class="row">
      <label>Download:</label>
      <select id="downloadRes">
        <option value="none">Don't download</option>
        <option value="1k">1K (original)</option>
        <option value="2k">2K (upscale)</option>
        <option value="4k" selected>4K (upscale)</option>
      </select>
    </div>
    <div class="row">
      <label>Delay (s):</label>
      <input type="number" id="delayBetween" value="3" min="1" max="60" style="width:60px;" title="Delay between prompts">
    </div>
  </div>

  <!-- Prompts -->
  <div class="card">
    <h3>Prompts (one per line)</h3>
    <textarea id="prompts" placeholder="A beautiful sunset over mountains...&#10;A cyberpunk city at night...&#10;An underwater coral reef scene..."></textarea>
  </div>

  <!-- Controls -->
  <div class="card">
    <div class="actions">
      <button id="btnStart" class="btn-primary">▶ Start Queue</button>
      <button id="btnStop" class="btn-danger" disabled>■ Stop</button>
    </div>
    <div class="actions" style="margin-top:6px;">
      <button id="btnTestBridge" class="btn-secondary btn-small">Test API Bridge</button>
      <button id="btnClearLog" class="btn-secondary btn-small">Clear Log</button>
    </div>
  </div>

  <!-- Queue Status -->
  <div class="card">
    <h3>Queue (<span id="queueCount">0</span>)</h3>
    <div id="queueList"></div>
  </div>

  <!-- Log -->
  <div class="card">
    <h3>Log</h3>
    <div id="log"></div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
